; =============================================================================
; PTZ Controller v2 — PlatformIO Multi-Node Configuration
; Three ESP32 CAN bus nodes: pan, tilt, stationary
; Shared protocol headers in /protocol
; =============================================================================

[platformio]
name         = PTZ Controller v2
default_envs = pan
core_dir     = C:\.pio
src_dir      = .

; ---------------------------------------------------------------------------
; Shared settings inherited by all node environments
; ---------------------------------------------------------------------------
[common]
platform        = espressif32 @ ^6.9.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time
upload_speed    = 921600
build_flags     =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -pipe
    -Iprotocol

; Core TMC2209 + stepper libs used by all nodes
lib_deps_common =
    gin66/FastAccelStepper @ ^0.30.0
    teemuatlut/TMCStepper @ ^0.7.3

; ---------------------------------------------------------------------------
; Pan node — pan/tilt axes, GPS, IMU, power monitor, baro
; ---------------------------------------------------------------------------
[env:pan]
extends         = common
upload_port     = COM6
monitor_port    = COM6
build_src_filter = -<*> +<nodes/pan/src/>
build_flags     =
    ${common.build_flags}
    -Inodes/pan/include
    -DNODE_PAN
lib_deps =
    ${common.lib_deps_common}
    https://github.com/wollewald/INA226_WE.git
    adafruit/Adafruit BMP280 Library @ ^2.6.8
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    mikalhart/TinyGPSPlus @ ^1.0.3

; ---------------------------------------------------------------------------
; Tilt node — lens steppers (up to 4), Pi UART bridge
; ---------------------------------------------------------------------------
[env:tilt]
extends         = common
build_src_filter = -<*> +<nodes/tilt/src/>
build_flags     =
    ${common.build_flags}
    -Inodes/tilt/include
    -DNODE_TILT
lib_deps =
    ${common.lib_deps_common}

; ---------------------------------------------------------------------------
; Stationary node — 1 stepper + sensors TBD
; ---------------------------------------------------------------------------
[env:stationary]
extends         = common
build_src_filter = -<*> +<nodes/stationary/src/>
build_flags     =
    ${common.build_flags}
    -Inodes/stationary/include
    -DNODE_STATIONARY
lib_deps =
    ${common.lib_deps_common}

; ---------------------------------------------------------------------------
; Debug variants
; ---------------------------------------------------------------------------
[env:pan_debug]
extends         = pan
build_flags     =
    ${common.build_flags}
    -Inodes/pan/include
    -DNODE_PAN
    -DCORE_DEBUG_LEVEL=5
    -DPTZ_DEBUG=1
