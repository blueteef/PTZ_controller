; =============================================================================
; PTZ Controller — PlatformIO Project Configuration
; =============================================================================
[platformio]
name         = PTZ Controller
default_envs = esp32dev

[env]
platform  = espressif32 @ ^6.9.0
board     = esp32dev
framework = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time
upload_speed    = 921600
; Bluepad32 replaces the Arduino-ESP32 framework core — not a normal lib_deps entry.
platform_packages =
    framework-arduinoespressif32@https://github.com/maxgerhardt/pio-framework-bluepad32/archive/refs/heads/main.zip
lib_deps =
    gin66/FastAccelStepper @ ^0.30.0
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0

; -----------------------------------------------------------------------------
; UART-only drive mode (default)
;   3 wires per driver: Tx / Rx / GND
;   Driver work mode:   CR_UART
;   Motion control:     MKS UART commands (0xF6 velocity, 0xFD position, 0xF7 stop)
;   FastAccelStepper:   compiled in but unused (retained for stepper builds)
; -----------------------------------------------------------------------------
[env:esp32dev]
build_flags =
    ${env.build_flags}
    -DPTZ_DRIVE_UART
    -DPTZ_VERSION_EXTRA=""

; -----------------------------------------------------------------------------
; Full 6-wire drive mode
;   6 wires per driver: Step / Dir / En / Tx / Rx / GND
;   Driver work mode:   CR_vFOC
;   Motion control:     FastAccelStepper (step/dir pulses)
;   UART:               config, encoder readback, status, homing only
; -----------------------------------------------------------------------------
[env:esp32dev_stepper]
build_flags =
    ${env.build_flags}
    -DPTZ_DRIVE_STEPPER
    -DPTZ_VERSION_EXTRA=\"-stepper\"

[env:esp32dev_debug]
build_flags =
    ${env.build_flags}
    -DPTZ_DRIVE_UART
    -DCORE_DEBUG_LEVEL=5
    -DPTZ_DEBUG=1
    -DPTZ_VERSION_EXTRA="-debug"

[env:esp32dev_release]
build_flags =
    ${env.build_flags}
    -DPTZ_DRIVE_UART
    -O2
    -DNDEBUG
    -DPTZ_VERSION_EXTRA="-release"
