; =============================================================================
; PTZ Controller — PlatformIO Project Configuration
; A4988 step/dir/en drivers on both axes.  No Bluepad32, no MKS UART.
; =============================================================================
[platformio]
name         = PTZ Controller
default_envs = esp32dev
core_dir     = C:\.pio

[env:esp32dev]
platform        = espressif32 @ ^6.9.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time
upload_speed    = 921600
upload_port     = COM6
monitor_port    = COM6
lib_deps =
    gin66/FastAccelStepper @ ^0.30.0
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -pipe

[env:esp32dev_debug]
platform        = espressif32 @ ^6.9.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time
upload_speed    = 921600
lib_deps =
    gin66/FastAccelStepper @ ^0.30.0
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DPTZ_DEBUG=1
    -pipe
